<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 700" width="500" height="700">
  <defs>
    <style>
      .skin { fill: #FDDCB5; }
      .eyebrow { fill: #1A1A1A; }
      .eye { fill: #1A1A1A; }
      .blush { fill: #FF9999; opacity: 0.4; }
      .mouth { fill: #CC4444; }
      .hair { fill: #1A1A1A; }
      .shirt { fill: #2D4A3E; }
      .tie { fill: #C8963E; }
      .collar { fill: #FFFFFF; }
      .pants { fill: #2D4A3E; }
      .shoes { fill: #3D2B1F; }
      .briefcase { fill: #6B4226; }
      .briefcase-detail { fill: #8B5E3C; }
      .suit-line { fill: none; stroke: #1E332A; stroke-width: 1.5; }
    </style>
  </defs>

  <!-- LEGS -->
  <rect x="170" y="430" width="55" height="80" rx="20" class="pants"/>
  <rect x="275" y="430" width="55" height="80" rx="20" class="pants"/>

  <!-- SHOES -->
  <ellipse cx="197" cy="515" rx="35" ry="18" class="shoes"/>
  <ellipse cx="303" cy="515" rx="35" ry="18" class="shoes"/>

  <!-- SOCKS -->
  <rect x="175" y="490" width="45" height="25" rx="5" fill="#FFFFFF"/>
  <rect x="280" y="490" width="45" height="25" rx="5" fill="#FFFFFF"/>

  <!-- BODY / SUIT JACKET -->
  <rect x="145" y="260" width="210" height="180" rx="35" class="shirt"/>
  <!-- Jacket lapels -->
  <path d="M250 280 L220 340 L250 360 L280 340 L250 280" fill="#1E332A" opacity="0.3"/>
  
  <!-- WHITE SHIRT COLLAR -->
  <path d="M210 270 L250 310 L290 270" class="collar" stroke="#DDD" stroke-width="1"/>

  <!-- GOLD TIE -->
  <path d="M238 310 L250 290 L262 310 L258 370 L250 385 L242 370 Z" class="tie"/>

  <!-- BUTTONS -->
  <circle cx="250" cy="380" r="4" fill="#C8963E"/>
  <circle cx="250" cy="400" r="4" fill="#C8963E"/>

  <!-- LEFT ARM -->
  <rect x="125" y="275" width="35" height="100" rx="17" class="shirt" transform="rotate(-10, 142, 275)"/>
  <!-- LEFT HAND -->
  <circle cx="137" cy="385" r="20" class="skin"/>

  <!-- RIGHT ARM (holding briefcase) -->
  <rect x="340" y="275" width="35" height="90" rx="17" class="shirt" transform="rotate(15, 357, 275)"/>
  <!-- RIGHT HAND -->
  <circle cx="360" cy="370" r="20" class="skin"/>

  <!-- BRIEFCASE -->
  <rect x="340" y="365" width="60" height="45" rx="8" class="briefcase"/>
  <rect x="345" y="370" width="50" height="35" rx="5" class="briefcase-detail"/>
  <rect x="365" y="380" width="10" height="15" rx="3" fill="#4A2F14"/>
  <!-- Briefcase handle -->
  <path d="M352 365 Q370 350 388 365" class="suit-line" stroke="#4A2F14" stroke-width="3"/>

  <!-- HEAD -->
  <ellipse cx="250" cy="180" rx="105" ry="95" class="skin"/>

  <!-- HAIR - spiky tufts on top -->
  <path d="M185 120 Q190 70 200 55 L205 85 Q210 45 220 35 L225 80 Q235 40 250 30 L255 75 Q265 38 280 40 L278 82 Q290 50 300 60 L295 90 Q310 75 315 95 L305 105 Q320 110 320 130 L310 125 Q325 140 320 155 L180 140 Q175 125 185 120 Z" class="hair"/>

  <!-- LEFT EYEBROW -->
  <path d="M180 155 Q210 130 245 155" class="eyebrow" stroke="#1A1A1A" stroke-width="8" stroke-linecap="round" fill="none"/>
  
  <!-- RIGHT EYEBROW -->
  <path d="M255 155 Q290 130 320 155" class="eyebrow" stroke="#1A1A1A" stroke-width="8" stroke-linecap="round" fill="none"/>

  <!-- LEFT EYE -->
  <ellipse cx="215" cy="185" rx="10" ry="11" class="eye"/>
  
  <!-- RIGHT EYE -->
  <ellipse cx="285" cy="185" rx="10" ry="11" class="eye"/>

  <!-- LEFT BLUSH -->
  <ellipse cx="185" cy="200" rx="25" ry="15" class="blush"/>
  
  <!-- RIGHT BLUSH -->
  <ellipse cx="315" cy="200" rx="25" ry="15" class="blush"/>

  <!-- NOSE -->
  <path d="M248 195 Q252 195 254 200" class="suit-line" stroke="#E8B88A" stroke-width="2.5" stroke-linecap="round" fill="none"/>

  <!-- MOUTH - cheeky grin -->
  <path d="M210 215 Q225 235 250 225 Q275 235 290 215" class="mouth" stroke="#CC4444" stroke-width="2" fill="#CC4444"/>
  
  <!-- Tongue -->
  <ellipse cx="250" cy="227" rx="15" ry="5" fill="#FF7777" opacity="0.7"/>

</svg>
