<svg xmlns="http://www.w3.org/2000/svg" width="220" height="60" viewBox="0 0 220 60">
  <defs>
    <style>
      .petal-outer { fill: #e69430; }
      .petal-inner { fill: #f2f2f2; }
      .center-star { fill: #104557; }
      .brand-text { font-family: 'Noto Sans TC', Arial, sans-serif; font-weight: 700; fill: #104557; }
      .brand-sub { font-family: 'Noto Sans TC', Arial, sans-serif; font-weight: 400; fill: #6b7a7a; }
    </style>
  </defs>
  
  <!-- 五瓣花 Logo -->
  <g transform="translate(30, 30)">
    <!-- 外瓣（琥珀金） -->
    <path class="petal-outer" d="M0,-25 C8,-28 12,-18 8,-8 C4,-18 0,-20 0,-25Z" transform="rotate(0)"/>
    <path class="petal-outer" d="M0,-25 C8,-28 12,-18 8,-8 C4,-18 0,-20 0,-25Z" transform="rotate(72)"/>
    <path class="petal-outer" d="M0,-25 C8,-28 12,-18 8,-8 C4,-18 0,-20 0,-25Z" transform="rotate(144)"/>
    <path class="petal-outer" d="M0,-25 C8,-28 12,-18 8,-8 C4,-18 0,-20 0,-25Z" transform="rotate(216)"/>
    <path class="petal-outer" d="M0,-25 C8,-28 12,-18 8,-8 C4,-18 0,-20 0,-25Z" transform="rotate(288)"/>
    <!-- 內瓣（白色） -->
    <path class="petal-inner" d="M0,-17 C5,-19 8,-12 5,-5 C2,-12 0,-14 0,-17Z" transform="rotate(36)"/>
    <path class="petal-inner" d="M0,-17 C5,-19 8,-12 5,-5 C2,-12 0,-14 0,-17Z" transform="rotate(108)"/>
    <path class="petal-inner" d="M0,-17 C5,-19 8,-12 5,-5 C2,-12 0,-14 0,-17Z" transform="rotate(180)"/>
    <path class="petal-inner" d="M0,-17 C5,-19 8,-12 5,-5 C2,-12 0,-14 0,-17Z" transform="rotate(252)"/>
    <path class="petal-inner" d="M0,-17 C5,-19 8,-12 5,-5 C2,-12 0,-14 0,-17Z" transform="rotate(324)"/>
    <!-- 中心星 -->
    <circle class="center-star" cx="0" cy="0" r="4"/>
  </g>
  
  <!-- 品牌文字 -->
  <text class="brand-text" x="68" y="32" font-size="22">伊萊診所</text>
  <text class="brand-sub" x="68" y="48" font-size="12">Elai Clinic</text>
</svg>
