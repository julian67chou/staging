<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>頁面未找到 - 伊萊診所</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">
    <link rel="shortcut icon" type="image/x-icon" href="assets/favicon.svg">
    <style>
        .error-section {
            min-height: 70vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 50px 20px;
        }
        .error-code {
            font-size: 8rem;
            font-weight: 900;
            color: var(--primary-blue);
            line-height: 1;
        }
        .error-message {
            font-size: 1.5rem;
            margin-bottom: 30px;
            color: var(--gray);
        }
    </style>
</head>
<body>
    <!-- 導覽列 -->
    <nav class="navbar navbar-expand-lg navbar-light fixed-top">
        <div class="container">
            <a class="navbar-brand" href="/">
<div class="d-flex align-items-center">
  <img src="assets/logo.png" alt="伊萊診所 LOGO" class="navbar-logo me-2">
  <span class="brand-text">伊萊診所</span>
</div>
</a>
        </div>
    </nav>

    <!-- 錯誤內容 -->
    <section class="error-section">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-8">
                    <div class="error-code">404</div>
                    <h1 class="mb-4">頁面未找到</h1>
                    <p class="error-message">
                        抱歉，您尋找的頁面可能已經移動、刪除或暫時無法使用。
                    </p>
                    <p class="mb-5">
                        請檢查網址是否正確，或返回首頁繼續瀏覽。
                    </p>
                    <div class="d-flex justify-content-center flex-wrap">
                        <a href="/" class="btn btn-primary btn-lg me-3 mb-3">
                            <i class="bi bi-house-door"></i> 返回首頁
                        </a>
                        <a href="/#contact" class="btn btn-outline-primary btn-lg mb-3">
                            <i class="bi bi-telephone"></i> 聯絡我們
                        </a>
                        <button onclick="history.back()" class="btn btn-outline-secondary btn-lg ms-3 mb-3">
                            <i class="bi bi-arrow-left"></i> 回上一頁
                        </button>
                    </div>
                    
                    <div class="mt-5">
                        <h5 class="mb-3">您可能想要：</h5>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <a href="/#services" class="card h-100 text-decoration-none">
                                    <div class="card-body text-center">
                                        <i class="bi bi-heart-pulse fs-1 text-primary mb-3"></i>
                                        <h6>服務項目</h6>
                                        <p class="text-muted small">了解我們的專業醫療服務</p>
                                    </div>
                                </a>
                            </div>
                            <div class="col-md-4 mb-3">
                                <a href="/#doctors" class="card h-100 text-decoration-none">
                                    <div class="card-body text-center">
                                        <i class="bi bi-person-badge fs-1 text-primary mb-3"></i>
                                        <h6>醫師介紹</h6>
                                        <p class="text-muted small">認識我們的醫療團隊</p>
                                    </div>
                                </a>
                            </div>
                            <div class="col-md-4 mb-3">
                                <a href="/#health-info" class="card h-100 text-decoration-none">
                                    <div class="card-body text-center">
                                        <i class="bi bi-journal-text fs-1 text-primary mb-3"></i>
                                        <h6>健康資訊</h6>
                                        <p class="text-muted small">閱讀健康相關文章</p>
                                    </div>
                                </a>
                            </div>
                        </div>
                    </div>
                    
                    <div class="mt-5 pt-5 border-top">
                        <p class="text-muted small">
                            如果您認為這是一個錯誤，請聯絡我們：<br>
                            <a href="mailto:contact@elai-clinic.tw" class="text-primary">contact@elai-clinic.tw</a> 或致電 <a href="tel:031234567" class="text-primary">(03) 123-4567</a>
                        </p>
                        <p class="text-muted small">
                            最後更新: <span class="last-updated">2024年12月15日</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- 頁尾 -->
    <footer class="footer">
        <div class="container">
            <div class="copyright text-center">
                <p class="mb-0">
                    &copy; 2024 伊萊診所. 保留所有權利.
                </p>
            </div>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
    <!-- 自訂 JS -->
    <script src="/js/main.js"></script>
</body>
</html>
